<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Test Result Card</title>

  <link rel="stylesheet" href="styl.css">
</head>
<body>
  <div class="card">
    <div class="result-panel">
      <h2>Your Result</h2>
      <div class="score" style=" margin-left: 50px;height: 150px;width: 150px;border: 1px solid blue; background-color: blue; border-color: rgba(0, 0, 255, 0.763); border-radius: 50%; text-align: center; ">76 <br>of 100</div>
      <div class="comment">Great</div>
      <p>You scored higher than 65% of the people who have taken these tests.</p>
    </div>

  
    <div class="summary-panel">
      <h3>Summary</h3>
      <div class="summary-item" style="background-color: darkseagreen;" ><span>Reaction</span><span>80 / 100</span></div>
      <div class="summary-item" style="background-color: crimson;"><span>Memory</span><span>92 / 100</span></div>
      <div class="summary-item" style="background-color: rgb(143, 188, 188);"><span>Verbal</span><span>61 / 100</span></div>
      <div class="summary-item" style="background-color: greenyellow;"><span>Visual</span><span>73 / 100</span></div>
      <button class="continue-btn">Continue</button>
    </div>
  </div>
</body>
</html>
